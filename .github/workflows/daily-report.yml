name: Daily Data Report

on:
  schedule:
    # 00:44 UTC+8 = 16:44 UTC, reports yesterday's (fully completed) UTC day
    - cron: '44 16 * * *'
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Force a specific date (YYYY-MM-DD). Leave empty to auto-detect missing dates.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run daily report
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_NAME: ${{ secrets.HF_REPO_NAME }}
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
          EXCHANGES: ${{ vars.EXCHANGES || 'binance' }}
          SYMBOLS: ${{ vars.SYMBOLS || 'btcusdt' }}
          LEVELS: ${{ vars.LEVELS || 'l1,l2' }}
          REPORT_DATE: ${{ github.event.inputs.report_date || '' }}
        run: python daily_report.py
